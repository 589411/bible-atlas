name: 驗證時代資料
on:
  pull_request:
    paths: ['data/**']
  push:
    branches: [main]
    paths: ['data/**']
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: node scripts/validate.js
